apiVersion: v1
kind: Pod 
metadata: 
  name: tolerations
  labels: 
    purpose: toleration-demo 

spec: 
  nodeselector: 
    topology.kubernetes.io/zone: us-east-1b

  containers: 
  - name: nginx 
    image: nginx 

  tolerations:
  - key: "hardware"
    operator: "Equal"
    value: "gpu"
    effect: "NoSchedule"
  - key: "hardware"
    operator: "Equal"
    value: "gpu"
    effect: "NoExecute"        